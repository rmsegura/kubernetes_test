apiVersion: v1
kind: Pod 
metadata:
  name: pod1 
spec:
  containers:
  - name: busybox-container 
    image: busybox:1.30.1
    command: ['sh', '-c', 'while true; do date; sleep 3; done']
    volumeMounts: 
    - mountPath: /projects 
      name: projects-vol
  volumes:
    - name: projects-vol 
      nfs:
        server: 10.224.0.223
        path: /projects
