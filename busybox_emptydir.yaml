apiVersion: v1
kind: Pod 
metadata:
  name: busybox-pod 
  annotations:
    creator: codey_blackwel1@quick24x7.com
    environment: testing
spec:
  volumes:
  - name: demo-volume
    emptyDir:
      sizeLimit: 500Mi
  containers:
  - name: busybox-container
    image: busybox:1.30.1
    command: ['sh', '-c', 'while true; do date; sleep 3; done'] 
    volumeMounts:
    - name: demo-volume 
      mountPath: /demo
