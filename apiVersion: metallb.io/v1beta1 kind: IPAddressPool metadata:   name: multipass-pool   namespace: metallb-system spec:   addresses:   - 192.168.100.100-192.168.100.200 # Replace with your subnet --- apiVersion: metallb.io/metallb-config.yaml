apiVersion: metallb.io/v1beta1
kind: IPAddressPool
metadata:
  name: multipass-pool
  namespace: metallb-system
spec:
  addresses:
  - 192.168.64.200-192.168.64.250 # Replace with your subnet
---
apiVersion: metallb.io/v1beta1
kind: L2Advertisement
metadata:
  name: l2-advert
  namespace: metallb-system
spec:
  ipAddressPools:
  - multipass-pool
