apiVersion: v1
kind: Pod
metadata:
  name: multi-container-pod
spec:
  volumes:
    - name: log-files
      emptyDir: {}
  initContainers:
    - name: init-log
      image: busybox:1.30.1
      command: ['sh','-c','mkdir -p /opt/log/nginx && touch /opt/log/nginx/access.log && chmod 666 /opt/log/nginx/access.log']
      volumeMounts:
        - name: log-files
          mountPath: /opt/log/nginx
  containers:
    - name: web-server
      image: nginx
      volumeMounts:
        - name: log-files
          mountPath: /opt/log/nginx
    - name: web-logger  
      image: busybox:1.30.1
      command: ['sh', '-c', 'while true; do cat /opt/log/nginx/access.log; sleep 30; done']
      volumeMounts:
        - name: log-files
          mountPath: /opt/log/nginx