apiVersion: v1
kind: Pod
metadata:
  name: alpine
spec:
  initContainers:
    - name: init-creaate-dir
      image: alpine
      command: ['sh', '-c', 'sleep 5 && echo "creating log directory" && mkdir -p /opt/logs']
      volumeMounts:
        - name: data
          mountPath: /opt
  containers:
    - name: app1
      image: alpine
      command: ['sh', '-c', 'sleep 5 && echo "app1 is running" && sleep infinity']
      volumeMounts:
        - name: data
          mountPath: /opt
  volumes:
    - name: data
      emptyDir: {}
